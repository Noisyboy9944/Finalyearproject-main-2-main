
services:
  # ─── MongoDB ────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: unilearnhub-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: unilearnhub
    networks:
      - unilearnhub-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─── FastAPI Backend ─────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: unilearnhub-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      MONGO_URL: mongodb://mongodb:27017
      DB_NAME: unilearnhub
      GROQ_API_KEY: ${GROQ_API_KEY}
    volumes:
      - ./backend:/app
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - unilearnhub-net

  # ─── React Frontend ───────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: unilearnhub-frontend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      REACT_APP_BACKEND_URL: http://localhost:8000
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    depends_on:
      - backend
    networks:
      - unilearnhub-net

# ─── Volumes & Networks ────────────────────────────────
volumes:
  mongo_data:
    name: unilearnhub-mongo-data

networks:
  unilearnhub-net:
    name: unilearnhub-network
    driver: bridge
